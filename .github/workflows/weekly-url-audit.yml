name: Weekly Full URL Audit

# 全sitemap URLを週次でHEADチェック。404/500を全件検出してissue作成
# 既存の Daily Health Check は50URLランダムサンプル、これは全数 (~13,500)

on:
  schedule:
    - cron: "0 4 * * 0"  # 毎週日曜 04:00 UTC = 13:00 JST
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch all sitemap URLs
        run: |
          set +e
          curl -s https://landscapes-of-japan.com/sitemap.xml \
            | grep -oP '<loc>\K[^<]+' > sitemaps.txt

          for sm in $(cat sitemaps.txt); do
            curl -s "$sm" | grep -oP '<loc>\K[^<]+' >> all-urls.txt
          done

          TOTAL=$(wc -l < all-urls.txt)
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "Total URLs: $TOTAL"

      - name: HEAD check all URLs (parallelized)
        run: |
          set +e
          # xargs -P で並列度20で全URL HEAD チェック
          cat all-urls.txt | xargs -P 20 -I {} \
            sh -c 'CODE=$(curl -s -o /dev/null -w "%{http_code}" -I "{}" -A "GitHub-WeeklyAudit/1.0"); \
                   if [ "$CODE" != "200" ] && [ "$CODE" != "301" ] && [ "$CODE" != "308" ]; then \
                     echo "$CODE {}"; \
                   fi' > failures.txt

          FAILED=$(wc -l < failures.txt)
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "Failed URLs: $FAILED"

          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::$FAILED failures found"
            head -50 failures.txt
          fi

      - name: Create issue if failures detected
        if: env.FAILED != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const failures = fs.readFileSync('failures.txt', 'utf-8').trim();
            const failed = parseInt(process.env.FAILED);
            const total = parseInt(process.env.TOTAL);
            const sample = failures.split('\n').slice(0, 100).join('\n');
            const body = `## Weekly URL Audit Results\n\n` +
              `- Total URLs: ${total}\n` +
              `- Failed: ${failed} (${(failed/total*100).toFixed(2)}%)\n\n` +
              `### Sample failures (up to 100):\n\n\`\`\`\n${sample}\n\`\`\`\n\n` +
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[URL Audit] ${failed} broken URLs detected (${new Date().toISOString().slice(0,10)})`,
              body,
              labels: ["url-audit", "automated"],
            });

      - name: Summary
        if: always()
        run: |
          echo "### Weekly URL Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Total URLs: $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "- Failed: $FAILED" >> $GITHUB_STEP_SUMMARY
          if [ "$FAILED" != "0" ] && [ "$FAILED" != "" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Sample failures:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -30 failures.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
